<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
  <!-- IC chip body -->
  <rect x="4" y="4" width="8" height="8" rx="1"/>
  <!-- Left pins -->
  <line x1="1" y1="6"  x2="4" y2="6"/>
  <line x1="1" y1="10" x2="4" y2="10"/>
  <!-- Right pins -->
  <line x1="12" y1="6"  x2="15" y2="6"/>
  <line x1="12" y1="10" x2="15" y2="10"/>
  <!-- Top pins -->
  <line x1="6"  y1="1" x2="6"  y2="4"/>
  <line x1="10" y1="1" x2="10" y2="4"/>
  <!-- Bottom pins -->
  <line x1="6"  y1="12" x2="6"  y2="15"/>
  <line x1="10" y1="12" x2="10" y2="15"/>
</svg>
