name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run compile

      - run: npm run lint

      - name: Package extension
        run: npx vsce package --out clash-toolkit.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: clash-toolkit-vsix
          path: clash-toolkit.vsix
